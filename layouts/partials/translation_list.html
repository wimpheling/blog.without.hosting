{{- if .IsTranslated -}}
<div class="post-translation-banner">
  {{- range .Translations -}}
    {{- if eq .Lang "fr" -}}
    🇫🇷 Ce post est disponible en français&nbsp;: <a href="{{ .Permalink }}">{{ .Title }}</a>
    {{- else -}}
    🇬🇧 This post is also available in English&nbsp;: <a href="{{ .Permalink }}">{{ .Title }}</a>
    {{- end -}}
  {{- end -}}
</div>
{{- end -}}
