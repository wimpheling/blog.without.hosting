backend:
  name: github
  repo: wimpheling/blog.without.hosting
  branch: master
  site_domain: blog.without.hosting

publish_mode: editorial_workflow

media_folder: "static/images"
public_folder: "/images"

collections:
  - name: "posts"
    label: "Posts"
    label_singular: "Post"
    folder: "content/posts"
    create: true
    format: "frontmatter"
    preview_path: "posts/{{slug}}"
    sort: "date:desc"
    summary: "{{title}} — {{date}}"
    view_filters:
      - label: "Unlisted (drafts)"
        field: unlisted
        pattern: true
      - label: "Published"
        field: unlisted
        pattern: false
    fields:
      - { label: "Title", name: "title", widget: "string", required: true }
      - { label: "Publish Date", name: "date", widget: "datetime", required: true }
      - { label: "Description", name: "description", widget: "text", required: false }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Table of Contents", name: "toc", widget: "boolean", default: false, required: false }
      - { label: "Unlisted (hidden from index)", name: "unlisted", widget: "boolean", default: true, required: false }
      - { label: "Body", name: "body", widget: "markdown", required: true }